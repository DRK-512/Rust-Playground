# cargo +nightly fmt
unstable_features = true
# Person features
wrap_comments = true
binop_separator = "Back"
brace_style = "SameLineWhere"
format_strings = true
struct_lit_width = 80
# Both from linux guidelines
max_width = 80
array_width = 80
tab_spaces = 8
error_on_line_overflow = true
blank_lines_upper_bound = 1

